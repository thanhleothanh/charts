# Self-hosted - dev namespace

namespace:
  name: dev
  createResourceQuota: true
  resourceQuota:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

apps:
  kotlin-spring:
    enabled: true
    image:
      repository: ghcr.io/thanhleothanh/kotlin-spring
      tag: latest
      pullPolicy: Always
    replicaCount: 1
    service:
      port: 8080
    ingress:
      enabled: true
      hosts:
        - paths:
            - path: /kotlin-spring
              pathType: Prefix
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi

configMap:
  enabled: true
  data:
    DB_URL: jdbc:postgresql://host.docker.internal:5432/demo
    DB_USERNAME: postgres
    DB_PASSWORD: postgres