# Azure AKS - dev namespace

namespace:
  name: dev
  createResourceQuota: true
  resourceQuota:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

apps:
  kotlin-spring:
    enabled: true
    image:
      repository: ghcr.io/thanhleothanh/kotlin-spring
      tag: latest
    replicaCount: 1
    service:
      port: 8080
    ingress:
      enabled: true
      hosts:
        - host: kotlin-spring.dev.aks.example.com
          paths:
            - path: /
              pathType: Prefix
