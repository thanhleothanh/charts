name: Helm Lint

on:
  push:
    branches: [main]
    paths: ['charts/**', 'environments/**']
  pull_request:
    branches: [main]
    paths: ['charts/**', 'environments/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Add Helm repos
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
      - name: Lint charts
        run: |
          for infra_values in environments/*/infra/*-values.yaml; do
            chart_name="$(basename "$infra_values" -values.yaml)"
            if [ "$chart_name" = "ingress-controller" ]; then
              helm template test traefik/traefik -f "$infra_values"
            else
              helm lint "charts/infra/$chart_name" -f "$infra_values"
              helm template test "charts/infra/$chart_name" -f "$infra_values"
            fi
          done

          for app_values in environments/*/apps/*/values.yaml; do
            helm lint charts/apps/namespace -f "$app_values"
            helm template test charts/apps/namespace -f "$app_values"
          done
