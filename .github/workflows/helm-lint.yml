name: Helm Lint

on:
  push:
    branches: [main]
    paths: ['charts/**', 'environments/**']
  pull_request:
    branches: [main]
    paths: ['charts/**', 'environments/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint charts
        run: |
          for infra_values in environments/*/infra/*-values.yaml; do
            env_dir="$(dirname "$(dirname "$infra_values")")"
            env="$(basename "$env_dir")"
            chart_name="$(basename "$infra_values" -values.yaml)"
            helm lint "charts/infra/$chart_name" -f "$infra_values"
          done

          for app_values in environments/*/apps/*/values.yaml; do
            helm template dev charts/apps/namespace -f "$app_values"
          done
