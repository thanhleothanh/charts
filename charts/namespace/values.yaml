# Per-namespace app values
# Each namespace (dev, staging, prod) gets its own copy of this file
# with different app toggles and image tags

# namespace:
#   name: dev
#   createResourceQuota: true
#   resourceQuota:
#     requests:
#       cpu: "2"
#       memory: 4Gi
#     limits:
#       cpu: "4"
#       memory: 8Gi

defaults:
  replicaCount: 1
  image:
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: traefik
    annotations: {}
    tls: []

# For private ghcr.io images:
# imagePullSecrets:
#   - name: ghcr-pull
imagePullSecrets: []

# Namespace-level ConfigMap (non-sensitive env vars injected into all apps)
configMap:
  enabled: false

# Namespace-level Secret (sensitive env vars injected into all apps)
secret:
  enabled: false

# Apps for this namespace
# Toggle enabled + set image tags per environment