apiVersion: v2
name: personal-cluster
description: Shared infrastructure for personal Kubernetes cluster (Traefik, monitoring)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: ingress-controller
    version: "1.0.0"
    repository: "file://../ingress-controller"
    condition: ingress-controller.enabled

  - name: monitoring
    version: "1.0.0"
    repository: "file://../monitoring"
    condition: monitoring.enabled


