{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $name }}
    {{- include "namespace.labels" $ | nindent 4 }}
spec:
  replicas: {{ $app.replicaCount | default $.Values.defaults.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $app.image.repository }}:{{ $app.image.tag }}"
          imagePullPolicy: {{ $app.image.pullPolicy | default $.Values.defaults.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $app.service.port | default $.Values.defaults.service.port }}
              protocol: TCP
          {{- $hasEnvFrom := (or (not (empty $app.configMapRefs)) (not (empty $app.secretRefs))) }}
          {{- if $hasEnvFrom }}
          envFrom:
            {{- range $app.configMapRefs }}
            - configMapRef:
                name: {{ .name }}
            {{- end }}
            {{- range $app.secretRefs }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- end }}
          {{- with $app.env }}
          env:
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml ($app.resources | default $.Values.defaults.resources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $name }}
    {{- include "namespace.labels" $ | nindent 4 }}
spec:
  type: {{ $app.service.type | default $.Values.defaults.service.type }}
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: {{ $app.service.port | default $.Values.defaults.service.port }}
      targetPort: http
      protocol: TCP
{{- if $app.ingress }}
{{- if $app.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $name }}
    {{- include "namespace.labels" $ | nindent 4 }}
  {{- with $app.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $app.ingress.className | default "traefik" }}
  {{- if $app.ingress.tls }}
  tls:
    {{- toYaml $app.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range $app.ingress.hosts }}
    - host: {{ .host | default "" | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $app.service.port | default $.Values.defaults.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
