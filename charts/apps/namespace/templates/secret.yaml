{{- if $.Values.validations.verifyRefs }}
{{- range $.Values.secret.refs }}
  {{- $secret := (lookup "v1" "Secret" $.Values.namespace.name .name) }}
  {{- if not $secret }}
    {{- fail (printf "namespace: secret.refs: Secret '%s' not found in namespace '%s'" .name $.Values.namespace.name) }}
  {{- end }}
{{- end }}
{{- range $name, $app := $.Values.apps }}
  {{- if $app.enabled }}
    {{- range $app.secretRefs }}
      {{- $secret := (lookup "v1" "Secret" $.Values.namespace.name .name) }}
      {{- if not $secret }}
        {{- fail (printf "app '%s': secretRefs: Secret '%s' not found in namespace '%s'" $name .name $.Values.namespace.name) }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
