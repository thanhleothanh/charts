{{- if $.Values.validations.verifyRefs }}
{{- $nsRefs := dict }}
{{- range $.Values.secret.refs }}
  {{- $_ := set $nsRefs .name (dict "remoteRef" .remoteRef) }}
  {{- if .remoteRef }}
    {{- printf "[validations.verifyRefs=true] secret.refs: '%s' has remoteRef — will be synced by External Secrets Operator" .name }}
  {{- else }}
    {{- $secret := (lookup "v1" "Secret" $.Values.namespace.name .name) }}
    {{- if not $secret }}
      {{- fail (printf "[validations.verifyRefs=true] secret.refs: '%s' not found in namespace '%s'" .name $.Values.namespace.name) }}
    {{- end }}
  {{- end }}
{{- end }}
{{- range $name, $app := $.Values.apps }}
  {{- if $app.enabled }}
    {{- range $app.secretRefs }}
      {{- $nsRef := get $nsRefs .name }}
      {{- if not $nsRef }}
        {{- fail (printf "[validations.verifyRefs=true] app '%s': secretRef '%s' is not defined in namespace secret.refs" $name .name) }}
      {{- end }}
      {{- if $nsRef.remoteRef }}
        {{- printf "[validations.verifyRefs=true] app '%s': secretRef '%s' has remoteRef — will be synced by External Secrets Operator" $name .name }}
      {{- else }}
        {{- $secret := (lookup "v1" "Secret" $.Values.namespace.name .name) }}
        {{- if not $secret }}
          {{- fail (printf "[validations.verifyRefs=true] app '%s': secretRef '%s' not found in namespace '%s'" $name .name $.Values.namespace.name) }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
